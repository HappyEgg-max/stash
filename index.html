<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stash</title>
<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --card2:#f8f8fb;
  --l3:#e8e8ed;
  --ink:#1c1c1e;
  --dim:#6c6c70;
  --line:rgba(0,0,0,.07);

  /* muted but characterful accents */
  --food1:#e07030;  --food2:#c03060;
  --wo1:#28a860;    --wo2:#1888a0;
  --act1:#2860c8;   --act2:#5828b0;
  --tr1:#7828b8;    --tr2:#a82890;
  --ot1:#b08010;    --ot2:#b84818;

  --blue:#2860c8;
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
  font-size:15px;min-height:100vh;padding-bottom:110px;
}
.wrap{max-width:720px;margin:0 auto;padding:0 16px}

/* ── header ── */
header{padding:30px 0 4px;display:flex;justify-content:space-between;align-items:flex-start}
.brand{
  font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--food1),var(--tr1));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:3px;
}
h1{font-size:32px;font-weight:800;letter-spacing:-.5px;color:var(--ink)}
.sub{color:var(--dim);font-size:13.5px;margin-top:4px;font-weight:500}
.avatar{
  width:36px;height:36px;border-radius:50%;flex:none;margin-top:6px;
  background:linear-gradient(135deg,var(--act1),var(--tr1));
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;
  border:none;cursor:pointer;box-shadow:0 2px 8px rgba(40,96,200,.3);
}

/* ── search ── */
.search{
  position:sticky;top:10px;z-index:20;
  display:flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--line);border-radius:14px;padding:12px 15px;margin:18px 0 6px;
  box-shadow:0 2px 12px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.04);
}
.search svg{flex:none;color:var(--dim)}
.search input{background:none;border:none;outline:none;color:var(--ink);font:500 15px inherit;font-family:inherit;width:100%}
.search input::placeholder{color:var(--dim)}

/* ── place pills ── */
.hint{color:var(--dim);font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin:14px 2px 8px}
.pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{
  flex:none;border:1px solid var(--line);cursor:pointer;
  background:var(--card);color:var(--ink);
  border-radius:999px;padding:7px 13px;
  font:600 12.5px inherit;font-family:inherit;
  display:flex;align-items:center;gap:5px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);transition:.15s;
}
.pill .ct{opacity:.45;font-size:11.5px}
.pill.on{background:var(--ink);color:#fff;border-color:transparent}

/* ── category rail ── */
.rail{display:flex;gap:9px;overflow-x:auto;padding:14px 0 14px;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.cat{
  flex:none;position:relative;overflow:hidden;cursor:pointer;
  border:1px solid var(--line);border-radius:18px;
  min-width:88px;padding:13px 13px 11px;text-align:left;
  background:var(--card);color:var(--ink);transition:.18s;font-family:inherit;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.cat .ico{font-size:20px}
.cat .nm{font-weight:800;font-size:13px;margin-top:7px;display:block}
.cat .ct{font-size:11px;font-weight:600;color:var(--dim)}
.cat::before{
  content:"";position:absolute;inset:0;opacity:0;transition:.2s;
  background:linear-gradient(140deg,var(--g1),var(--g2));
}
.cat>*{position:relative;z-index:1}
.cat.on{border-color:transparent;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.cat.on::before{opacity:1}
.cat.on .nm{color:#fff}
.cat.on .ct{color:rgba(255,255,255,.7)}
.cat[data-c="all"]{--g1:var(--act1);--g2:var(--tr1)}
.cat[data-c="Food"]{--g1:var(--food1);--g2:var(--food2)}
.cat[data-c="Workout"]{--g1:var(--wo1);--g2:var(--wo2)}
.cat[data-c="Activity"]{--g1:var(--act1);--g2:var(--act2)}
.cat[data-c="Travel"]{--g1:var(--tr1);--g2:var(--tr2)}
.cat[data-c="Other"]{--g1:var(--ot1);--g2:var(--ot2)}

/* ── masonry grid ── */
.grid{columns:2;column-gap:10px}
@media(min-width:560px){.grid{columns:3}}
.card{
  break-inside:avoid;margin-bottom:10px;display:block;
  background:var(--card);border-radius:var(--r);overflow:hidden;
  border:1px solid var(--line);transition:.15s;text-decoration:none;color:inherit;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.card:active{transform:scale(.975);box-shadow:none}

.cover{
  position:relative;min-height:var(--h,118px);
  background:linear-gradient(150deg,var(--g1),var(--g2));
  display:flex;align-items:center;justify-content:center;font-size:32px;
}
.cover::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.04),rgba(0,0,0,.22));
}
.cover .plat{
  position:absolute;top:9px;right:9px;z-index:1;
  background:rgba(255,255,255,.22);backdrop-filter:blur(8px);
  color:#fff;font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  padding:4px 8px;border-radius:999px;
}
.cover .ico{position:relative;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.2))}

.meta{padding:11px 12px 13px}
.meta h3{font-size:14px;font-weight:700;letter-spacing:-.15px;line-height:1.35;color:var(--ink)}
.meta p{color:var(--dim);font-size:12px;line-height:1.45;margin-top:3px;font-weight:500}
.locrow{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:11.5px;font-weight:600;color:var(--dim)}
.row{display:flex;align-items:center;gap:5px;margin-top:8px;flex-wrap:wrap}
.badge{
  font-size:11px;font-weight:700;
  background:linear-gradient(90deg,var(--g1),var(--g2));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  border:1px solid rgba(0,0,0,.08);border-radius:7px;padding:3px 8px;
}
.tag{font-size:11px;font-weight:600;color:var(--dim);background:var(--bg);border-radius:7px;padding:3px 7px}

.empty{text-align:center;color:var(--dim);padding:60px 20px;display:none}
.empty .big{font-size:40px}
.empty b{display:block;color:var(--ink);font-size:15px;margin-top:10px}

/* ── dock ── */
.dock{
  position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:30;
  display:flex;align-items:center;gap:2px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--line);border-radius:999px;padding:6px;
  box-shadow:0 4px 16px rgba(0,0,0,.1),0 16px 40px rgba(0,0,0,.08);
}
.dock button{
  border:none;background:none;color:var(--dim);cursor:pointer;
  font:700 12.5px inherit;font-family:inherit;
  padding:10px 18px;border-radius:999px;display:flex;align-items:center;gap:6px;transition:.15s;
}
.dock button.on{background:var(--bg);color:var(--ink)}
.dock .add{
  width:44px;height:44px;padding:0;border-radius:50%;
  justify-content:center;font-size:22px;font-weight:300;color:#fff;
  background:linear-gradient(135deg,var(--food1),var(--tr1));
  box-shadow:0 4px 14px rgba(224,112,48,.35);
}

/* ── note ── */
.note{margin:22px 0 0;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:14px;color:var(--dim);font-size:12px;line-height:1.6;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.note b{color:var(--ink)}

/* ── modals ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);z-index:40;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
@media(min-width:560px){.modal-bg.show{align-items:center}}
.modal{
  background:var(--card);border:1px solid var(--line);
  border-radius:24px 24px 0 0;width:100%;max-width:560px;
  padding:24px 18px calc(24px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 32px rgba(0,0,0,.1);
}
@media(min-width:560px){.modal{border-radius:24px;box-shadow:0 8px 48px rgba(0,0,0,.15)}}
.modal h2{font-size:19px;font-weight:800;margin-bottom:4px;color:var(--ink)}
.modal .d{color:var(--dim);font-size:13px;line-height:1.55;margin-bottom:14px}
.modal label{display:block;color:var(--dim);font-size:11.5px;font-weight:700;margin:12px 2px 6px;text-transform:uppercase;letter-spacing:.5px}
.modal input,.modal select,.modal textarea{
  width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;color:var(--ink);font:500 15px inherit;font-family:inherit;outline:none;-webkit-appearance:none;
}
.modal textarea{resize:vertical;min-height:60px}
.mrow{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;border:none;border-radius:13px;padding:14px;font:700 15px inherit;font-family:inherit;cursor:pointer}
.btn.pri{background:linear-gradient(135deg,var(--act1),var(--tr1));color:#fff}
.btn.sec{background:var(--l3);color:var(--ink)}
.err{color:#c0392b;font-size:12.5px;font-weight:600;margin-top:10px;display:none}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Stash</div>
      <h1>My Library</h1>
      <div class="sub" id="sub">Loading…</div>
    </div>
    <button class="avatar" id="settingsBtn">XY</button>
  </header>

  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="q" type="search" placeholder="Search food, workouts, places…">
  </div>

  <div class="hint" id="pillHint" style="display:none">Saved places</div>
  <div class="pills" id="pills"></div>
  <div class="rail" id="rail"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty"><div class="big">🔍</div><b>Nothing found</b><span style="font-size:13px;display:block;margin-top:4px">Try a different word or place</span></div>
  <div class="note" id="note"></div>
</div>

<nav class="dock">
  <button class="on">Library</button>
  <button class="add" id="addBtn">+</button>
  <button id="luckyBtn">🎲</button>
</nav>

<div class="modal-bg" id="setupModal">
  <div class="modal">
    <h2>Connect GitHub</h2>
    <div class="d">Links live in your <b>private repo</b>. This page only reads and writes your <b>links.json</b> — nothing else.</div>
    <label>GitHub username</label>
    <input id="s_owner" placeholder="e.g. HappyEgg-max" autocapitalize="none" autocorrect="off" spellcheck="false">
    <label>Private repo name</label>
    <input id="s_repo" placeholder="e.g. stash-data" autocapitalize="none" autocorrect="off" spellcheck="false">
    <label>Personal access token</label>
    <input id="s_token" type="password" placeholder="github_pat_…" autocapitalize="none" autocorrect="off" spellcheck="false">
    <div class="err" id="s_err"></div>
    <div class="mrow">
      <button class="btn sec" id="s_cancel">Stay demo</button>
      <button class="btn pri" id="s_save">Connect</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="addModal">
  <div class="modal">
    <h2>Add a link</h2>
    <div class="d">Manual save — or use the share sheet for one-tap saving.</div>
    <label>Video link</label>
    <input id="a_url" placeholder="https://…" autocapitalize="none" autocorrect="off" spellcheck="false">
    <label>Title</label>
    <input id="a_title" placeholder="e.g. Best prata after midnight">
    <label>Category</label>
    <select id="a_cat"><option>Food</option><option>Workout</option><option>Activity</option><option>Travel</option><option>Other</option></select>
    <label>Place (optional)</label>
    <input id="a_loc" placeholder="e.g. Tampines, Singapore">
    <label>Notes (optional)</label>
    <textarea id="a_desc" placeholder="anything to help you find it later"></textarea>
    <div class="err" id="a_err"></div>
    <div class="mrow">
      <button class="btn sec" id="a_cancel">Cancel</button>
      <button class="btn pri" id="a_save">Save</button>
    </div>
  </div>
</div>

<script>
const LS='stash_cfg_v2';
const CATS={
  Food:    {ico:'🍜',g1:'var(--food1)',g2:'var(--food2)'},
  Workout: {ico:'🏃',g1:'var(--wo1)',  g2:'var(--wo2)'},
  Activity:{ico:'🎨',g1:'var(--act1)', g2:'var(--act2)'},
  Travel:  {ico:'✈️',g1:'var(--tr1)',  g2:'var(--tr2)'},
  Other:   {ico:'💡',g1:'var(--ot1)',  g2:'var(--ot2)'},
};
const DEMO=[
  {cat:'Food',    plat:'TikTok',    title:'Famous bak chor mee',          desc:'Queue before 11am — sells out fast.',    tags:['hawker','noodles'], loc:'Ang Mo Kio, Singapore', url:'#'},
  {cat:'Food',    plat:'Instagram', title:'Brunch café by the beach',      desc:'Sourdough toasts, dog-friendly patio.',  tags:['brunch','café'],    loc:'Pasir Ris, Singapore',  url:'#'},
  {cat:'Activity',plat:'TikTok',   title:'Pottery painting studio',       desc:'Walk-in from $25, great rainy day.',     tags:['weekend','indoor'], loc:'Bugis, Singapore',      url:'#'},
  {cat:'Food',    plat:'TikTok',   title:'15-min garlic butter chicken',  desc:'One pan, 6 ingredients.',                tags:['recipe','chicken'], loc:null,                    url:'#'},
  {cat:'Travel',  plat:'Instagram',title:'Chiang Mai night market guide', desc:'8 must-try stalls on the Sunday street.',tags:['street food'],      loc:'Chiang Mai, Thailand',  url:'#'},
  {cat:'Workout', plat:'YouTube',  title:'20-min full body HIIT',         desc:'No equipment, beginner friendly.',        tags:['HIIT','home'],      loc:null,                    url:'#'},
  {cat:'Food',    plat:'TikTok',   title:'Best prata after midnight',     desc:'Crispy plaster prata, open till 4am.',   tags:['supper','prata'],   loc:'Tampines, Singapore',   url:'#'},
  {cat:'Activity',plat:'Instagram',title:'Boardwalk sunrise walk',        desc:'5km loop, start 6.30am for the light.',  tags:['nature','walk'],    loc:'Pasir Ris, Singapore',  url:'#'},
  {cat:'Workout', plat:'TikTok',  title:'Fix rounded shoulders in 5min', desc:'Desk worker mobility, do it daily.',      tags:['posture'],          loc:null,                    url:'#'},
];
let cfg=null,data=[],sha=null,cat='all';
try{cfg=JSON.parse(localStorage.getItem(LS))}catch(e){}
const $=id=>document.getElementById(id);
const API=()=>`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/links.json`;
const HDRS=()=>({'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json'});
const b64e=s=>btoa(unescape(encodeURIComponent(JSON.stringify(s,null,1))));
const b64d=s=>JSON.parse(decodeURIComponent(escape(atob(s.replace(/\n/g,'')))));
function platOf(u=''){
  if(u.includes('tiktok'))return'TikTok';
  if(u.includes('instagram')||u.includes('instagr.am'))return'Instagram';
  if(u.includes('youtu'))return'YouTube';
  return'Link';
}
async function load(){
  if(!cfg){data=DEMO;setNote('demo');paint();return}
  setNote('loading');
  try{
    const r=await fetch(API(),{headers:HDRS()});
    if(r.status===404){data=[];sha=null;setNote('ok');paint();return}
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();sha=j.sha;data=b64d(j.content);setNote('ok');
  }catch(e){data=DEMO;setNote('err');}
  paint();
}
async function saveEntry(entry){
  data.unshift(entry);
  const body={message:'Add: '+entry.title,content:b64e(data)};
  if(sha)body.sha=sha;
  const r=await fetch(API(),{method:'PUT',headers:{...HDRS(),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){data.shift();throw new Error('GitHub returned '+r.status);}
  sha=(await r.json()).content.sha;
}
function setNote(s){
  const n=$('note');
  if(s==='demo')     n.innerHTML='<b>Demo mode.</b> Tap your avatar (top right) to connect your private GitHub library.';
  else if(s==='loading') n.innerHTML='Loading your library…';
  else if(s==='err') n.innerHTML='<b>Could not connect.</b> Check settings (tap avatar). Showing demo data.';
  else n.innerHTML=`Connected · <b>${cfg.owner}/${cfg.repo}</b> · Tap + to add manually, or share from TikTok / IG / YouTube.`;
}
function paint(){
  $('sub').textContent=`${data.length} saves · ${data.filter(d=>d.loc).length} with places`;
  const locs=[...new Set(data.filter(d=>d.loc).map(d=>d.loc.split(',')[0].trim()))];
  $('pillHint').style.display=locs.length?'block':'none';
  $('pills').innerHTML=locs.map(l=>{
    const n=data.filter(d=>d.loc&&d.loc.includes(l)).length;
    return`<button class="pill" data-l="${l}">📍 ${l}<span class="ct"> ${n}</span></button>`;
  }).join('');
  const counts={};data.forEach(d=>counts[d.cat]=(counts[d.cat]||0)+1);
  $('rail').innerHTML=[
    `<button class="cat ${cat==='all'?'on':''}" data-c="all"><span class="ico">🗂️</span><span class="nm">All</span><span class="ct">${data.length}</span></button>`,
    ...Object.entries(CATS).map(([k,v])=>
      `<button class="cat ${cat===k?'on':''}" data-c="${k}"><span class="ico">${v.ico}</span><span class="nm">${k}</span><span class="ct">${counts[k]||0}</span></button>`)
  ].join('');
  render();
}
function render(){
  const t=$('q').value.trim().toLowerCase();
  const rows=data.filter(d=>{
    if(cat!=='all'&&d.cat!==cat)return false;
    if(!t)return true;
    return((d.title||'')+' '+(d.desc||'')+' '+(d.tags||[]).join(' ')+' '+(d.loc||'')).toLowerCase().includes(t);
  });
  $('grid').innerHTML=rows.map(d=>{
    const v=CATS[d.cat]||CATS.Other;
    const h=110+((d.title||'').length%5)*12;
    const p=d.plat||platOf(d.url);
    const href=d.url&&d.url!=='#'?d.url:'#';
    return`<a class="card" style="--g1:${v.g1};--g2:${v.g2}" href="${href}" target="_blank" rel="noopener" ${href==='#'?'onclick="return false"':''}>
      <div class="cover" style="--h:${h}px">
        <span class="ico">${v.ico}</span><span class="plat">${p}</span>
      </div>
      <div class="meta">
        <h3>${d.title||'Untitled'}</h3>
        ${d.desc?`<p>${d.desc}</p>`:''}
        ${d.loc?`<div class="locrow">📍 ${d.loc}</div>`:''}
        <div class="row">
          <span class="badge" style="--g1:${v.g1};--g2:${v.g2}">${d.cat}</span>
          ${(d.tags||[]).slice(0,3).map(x=>`<span class="tag">${x}</span>`).join('')}
        </div>
      </div>
    </a>`;
  }).join('');
  $('empty').style.display=rows.length?'none':'block';
}
const q=$('q');
$('pills').addEventListener('click',e=>{
  const b=e.target.closest('.pill');if(!b)return;
  const was=b.classList.contains('on');
  $('pills').querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));
  q.value=was?'':b.dataset.l;if(!was)b.classList.add('on');render();
});
$('rail').addEventListener('click',e=>{
  const b=e.target.closest('.cat');if(!b)return;
  $('rail').querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');cat=b.dataset.c;render();
});
q.addEventListener('input',()=>{$('pills').querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));render();});
$('luckyBtn').onclick=()=>{const d=data[Math.floor(Math.random()*data.length)];if(d&&d.url&&d.url!=='#')window.open(d.url,'_blank');};
$('settingsBtn').onclick=()=>{
  if(cfg){$('s_owner').value=cfg.owner;$('s_repo').value=cfg.repo;$('s_token').value=cfg.token;}
  $('setupModal').classList.add('show');
};
$('s_cancel').onclick=()=>$('setupModal').classList.remove('show');
$('s_save').onclick=async()=>{
  const owner=$('s_owner').value.trim(),repo=$('s_repo').value.trim(),token=$('s_token').value.trim();
  const err=$('s_err');err.style.display='none';
  if(!owner||!repo||!token){err.textContent='All three fields are required.';err.style.display='block';return;}
  $('s_save').textContent='Checking…';
  const test=await fetch(`https://api.github.com/repos/${owner}/${repo}`,{headers:{'Authorization':'Bearer '+token}});
  $('s_save').textContent='Connect';
  if(!test.ok){err.textContent='GitHub rejected it ('+test.status+'). Check username, repo name, and token.';err.style.display='block';return;}
  cfg={owner,repo,token};
  try{localStorage.setItem(LS,JSON.stringify(cfg));}catch(e){}
  $('setupModal').classList.remove('show');
  load();
};
$('addBtn').onclick=()=>{if(!cfg){$('setupModal').classList.add('show');return;}$('addModal').classList.add('show');};
$('a_cancel').onclick=()=>$('addModal').classList.remove('show');
$('a_save').onclick=async()=>{
  const err=$('a_err');err.style.display='none';
  const url=$('a_url').value.trim(),title=$('a_title').value.trim();
  if(!url||!title){err.textContent='Link and title are required.';err.style.display='block';return;}
  const entry={url,title,cat:$('a_cat').value,plat:platOf(url),
    loc:$('a_loc').value.trim()||null,desc:$('a_desc').value.trim()||null,
    tags:[],added:new Date().toISOString().slice(0,10)};
  try{
    $('a_save').textContent='Saving…';
    await saveEntry(entry);
    $('addModal').classList.remove('show');
    ['a_url','a_title','a_loc','a_desc'].forEach(i=>$(i).value='');
    paint();
  }catch(e){err.textContent=e.message;err.style.display='block';}
  $('a_save').textContent='Save';
};
load();
</script>
</body>
</html>
